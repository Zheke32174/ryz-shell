name: AeSH smoke

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run public AeSH smoke test
        run: sh scripts/smoke.sh
      - name: Launcher smoke
        run: sh bin/aesh -c "help"
